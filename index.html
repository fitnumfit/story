<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="A peaceful book of love and heartfelt apologies." />
  <meta name="theme-color" content="#5c1f28" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <title> Sonam's A Beautiful Book</title>
</head>

<body>
  <div class="bg" aria-hidden="true"></div>

  <button type="button" class="music-btn" id="music-btn" aria-label="Toggle music" title="Toggle music" hidden>
    <span id="music-icon">🎵</span>
  </button>

  <audio id="bgm" loop preload="auto">
    <source src="audio/peace.mp3" type="audio/mpeg" />
    <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_8cb7499ede.mp3" type="audio/mpeg" />
  </audio>

  <main class="app" id="app">
    <header class="hero" id="hero">
      <p class="hero__greeting">Hey Beautiful, Sonam</p>
      <p class="hero__message">Would you open this book for me?</p>
      <p class="hero__hint">5 chapters · peace, love &amp; honesty</p>
    </header>

    <p class="reading-bar" id="reading-bar" hidden aria-hidden="true">
      <span class="reading-bar__hi">Hey Beautiful,</span>
    </p>

    <div class="book-stage" id="book-stage">
      <article id="book" class="book book--closed">
        <div class="book__frame">
          <div class="book-closed" id="book-closed">
            <div class="book-closed__cover">
              <span class="book-closed__icon">☮</span>
              <h2 class="book-closed__title">Written by Snowy For You</h2>
              <p class="book-closed__sub">Hey Beautiful · Open with smile</p>
            </div>
          </div>

          <div class="book-open" id="book-open" hidden>
            <div class="book-open__spine" aria-hidden="true"></div>
            <div class="book-open__spread" id="spread">
              <div class="book-open__slot book-open__slot--left">
                <div class="book-open__under" id="under-left"></div>
                <div class="book-open__layer" id="layer-left"></div>
              </div>
              <div class="book-open__slot book-open__slot--right">
                <div class="book-open__under" id="under-right"></div>
                <div class="book-open__layer" id="layer-right"></div>
              </div>
            </div>
            <div class="book-open__flipper is-idle" id="flipper">
              <div class="book-open__flip-face book-open__flip-face--front" id="flip-front"></div>
              <div class="book-open__flip-face book-open__flip-face--back" id="flip-back"></div>
            </div>
            <div class="turn-hints" id="turn-hints">
              <button type="button" class="turn-zone turn-zone--left" id="zone-prev" aria-label="Turn to previous page"></button>
              <button type="button" class="turn-zone turn-zone--right" id="zone-next" aria-label="Turn to next page"></button>
            </div>
          </div>
        </div>
      </article>
    </div>

    <div class="actions" id="actions-open">
      <button type="button" class="btn btn--open" id="btn-open">Open the book ♡</button>
    </div>

    <footer class="footer is-visible" id="footer">
      Made with love by <a class="footer__ig" id="footer-ig" href="#" target="_blank" rel="noopener noreferrer">@snowy</a>
    </footer>
  </main>

  <script src="main.js"></script>
</body>

</html>
